<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login · AuditPilot</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="min-h-screen flex items-center justify-center px-6">

  <div class="grid-bg"></div>
  <div class="halo"></div>

  <main class="relative z-10 w-full max-w-md">
    <div class="glow-card p-8">

      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl mx-auto mb-5 flex items-center justify-center" style="background:#76fff5">
          <i data-lucide="radar" style="width:32px;height:32px;color:#0B2239"></i>
        </div>

        <h1 class="text-3xl font-bold mb-2">Acceso a AuditPilot</h1>
        <p class="text-sm" style="color:var(--text2)">
          Inicia sesión para gestionar tus auditorías.
        </p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="text-sm font-bold mb-2 block">Email</label>
          <input
            id="email"
            type="email"
            class="input-glow w-full px-5 py-4 rounded-xl"
            placeholder="admin@auditpilot.com"
            required
          >
        </div>

        <div>
          <label class="text-sm font-bold mb-2 block">Contraseña</label>
          <input
            id="password"
            type="password"
            class="input-glow w-full px-5 py-4 rounded-xl"
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="btn-primary w-full py-4 font-bold">
          Entrar
        </button>
      </form>

      <p class="text-sm text-slate-500 mt-6 text-center">
        ¿No era lo que buscabas?
        <a href="./index.html" class="text-teal-400 hover:underline">
          Volver al inicio
        </a>
      </p>

      <p id="loginMessage" class="text-sm text-center mt-5"></p>

    </div>
  </main>

  <script type="module" src="./js/login.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
